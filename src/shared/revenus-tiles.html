<!-- Fragment partagé : liste des tuiles Revenus, chargé par loader.js -->
<!-- Les champs de formulaire sont injectés dynamiquement depuis forms.js -->

<!-- ── FONCIERS ── -->
<div class="sim-tuile-wrapper" data-tile="fonciers">

  <!-- Fermé -->
  <button type="button" class="sim-tuile sim-tuile__btn--ajouter fr-p-3w">
    <div class="sim-tuile__entete">
      <div class="sim-tuile__title-row">
        <span class="fr-icon-community-line sim-tuile__icone" aria-hidden="true"></span>
        <span class="fr-h6 fr-mb-0">Fonciers</span>
      </div>
      <span class="sim-tuile__action">
        <span class="fr-icon-add-line sim-tuile__action-icon" aria-hidden="true"></span>
        Ajouter
      </span>
    </div>
    <p class="fr-text--sm fr-mb-0">Biens mis en location (hors locations meublées).</p>
  </button>

  <!-- Résumé après validation du hub (au moins un bien ajouté) -->
  <div class="sim-tuile-ouvert sim-tuile-ouvert--b fr-p-3w" hidden>
    <div class="sim-tuile-ouvert__header">
      <div class="sim-tuile__title-row">
        <span class="fr-icon-community-line sim-tuile__icone" aria-hidden="true"></span>
        <span class="fr-h6 fr-mb-0">Fonciers</span>
      </div>
      <button type="button" class="fr-btn fr-btn--tertiary fr-btn--sm fr-icon-delete-bin-line sim-tuile__btn--supprimer" aria-label="Supprimer Fonciers"></button>
    </div>
    <div class="sim-resume" hidden></div>
    <button type="button" class="fr-btn fr-btn--tertiary fr-btn--icon-left fr-icon-edit-line sim-tuile__btn--modifier" aria-label="Modifier Fonciers">
      Modifier
    </button>
  </div>

</div>
