<!-- Fragment partagé : liste des tuiles Revenus -->
<!-- Utilisé par variant-a et variant-b via loader.js -->
<!-- Les champs de formulaire sont injectés dynamiquement depuis forms.js -->

<!-- ── FONCIERS ── -->
<div class="sim-tuile-wrapper" data-tile="fonciers">

  <!-- Fermé -->
  <button type="button" class="sim-tuile sim-tuile__btn--ajouter fr-py-2w fr-px-3w">
    <div class="sim-tuile__info fr-pr-2w">
      <div class="sim-tuile__title-row">
        <span class="fr-icon-home-4-line sim-tuile__icone" aria-hidden="true"></span>
        <span class="sim-tuile__name">Fonciers</span>
      </div>
      <p class="sim-tuile__desc">Locations non meublées.</p>
    </div>
    <span class="sim-tuile__action">
      <span class="fr-icon-add-line sim-tuile__action-icon" aria-hidden="true"></span>
      Ajouter
    </span>
  </button>

  <!-- Ouvert – Variante A (champs injectés par forms.js) -->
  <div class="sim-tuile-ouvert sim-tuile-ouvert--a fr-p-3w" hidden>
    <div class="sim-tuile-ouvert__header">
      <div class="sim-tuile__title-row">
        <span class="fr-icon-home-4-line sim-tuile__icone" aria-hidden="true"></span>
        <span class="sim-tuile__name">Fonciers</span>
      </div>
      <button type="button" class="fr-btn fr-btn--tertiary fr-btn--sm fr-icon-delete-bin-line sim-tuile__btn--supprimer" aria-label="Supprimer Fonciers"></button>
    </div>
    <div data-fields></div>
  </div>

  <!-- Ouvert – Variante B (résumé après enregistrement) -->
  <div class="sim-tuile-ouvert sim-tuile-ouvert--b fr-p-3w" hidden>
    <div class="sim-tuile-ouvert__header">
      <div class="sim-tuile__title-row">
        <span class="fr-icon-home-4-line sim-tuile__icone" aria-hidden="true"></span>
        <span class="sim-tuile__name">Fonciers</span>
      </div>
      <button type="button" class="fr-btn fr-btn--tertiary fr-btn--sm fr-icon-delete-bin-line sim-tuile__btn--supprimer" aria-label="Supprimer Fonciers"></button>
    </div>
    <div class="sim-resume" hidden></div>
    <button type="button" class="fr-btn fr-btn--tertiary-no-outline fr-btn--icon-left fr-icon-edit-line sim-tuile__btn--modifier">
      Modifier
    </button>
  </div>

</div>
